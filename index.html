<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roller Coaster</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101219;
      color: #f5f7fb;
    }

    * { box-sizing: border-box; }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 310px;
      max-width: calc(100vw - 20px);
      max-height: calc(100dvh - 20px);
      overflow-y: auto;
      padding: 11px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      background: rgba(15, 19, 30, 0.88);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
      user-select: none;
      scrollbar-width: thin;
    }

    #ui h1 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    .panel-section {
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .direction-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .action-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .wide { grid-column: 1 / -1; }

    button {
      border: 0;
      border-radius: 10px;
      min-height: 38px;
      padding: 8px 9px;
      color: #fff;
      background: #3d6dff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
    }

    .icon-button {
      padding: 7px;
      font-size: 21px;
      line-height: 1;
    }

    .small-text-button {
      font-size: 12px;
      line-height: 1.05;
    }

    button:hover { filter: brightness(1.1); }
    button:active { transform: translateY(1px); }

    button.secondary { background: #384052; }
    button.warning { background: #a84545; }
    button.good { background: #27965f; }
    button.selected {
      color: #101219;
      background: #ffd166;
      box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.38), inset 0 -2px 0 rgba(0, 0, 0, 0.18);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      filter: grayscale(0.35);
    }

    label {
      display: block;
      margin: 6px 0;
      font-size: 11px;
      color: #dbe2f2;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 3px;
    }

    .value {
      float: right;
      color: #fff;
      font-weight: 800;
    }

    #no-three {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      background: #101219;
      color: #fff;
      z-index: 10;
    }

    @media (max-width: 520px) {
      #ui {
        top: 8px;
        left: 8px;
        width: min(292px, calc(100vw - 16px));
        max-height: calc(100dvh - 16px);
        padding: 9px;
      }

      #ui h1 { font-size: 15px; }
      .panel-section { margin-top: 7px; padding-top: 7px; }
      .grid { gap: 6px; }
      button { min-height: 34px; border-radius: 9px; }
      .icon-button { font-size: 19px; }
      label { margin: 4px 0; font-size: 10.5px; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="no-three">
    <div>
      <h2>Three.js could not be loaded.</h2>
      <p>This file is designed to be opened directly in a browser, but it needs the Three.js library. Check your internet connection or download <code>three.min.js</code> next to this HTML file and update the script tag.</p>
    </div>
  </div>

  <div id="ui">
    <h1>Roller Coasterr</h1>

    <div class="panel-section">
      <label>Length <span class="value" id="lengthValue">14</span>
        <input id="lengthSlider" type="range" min="5" max="30" step="1" value="14" />
      </label>
      <label>Angle <span class="value" id="angleValue">20°</span>
        <input id="angleSlider" type="range" min="5" max="60" step="1" value="20" />
      </label>
      <label>Stunt size <span class="value" id="stuntSizeValue">12</span>
        <input id="stuntSizeSlider" type="range" min="7" max="30" step="1" value="12" />
      </label>
    </div>

    <div class="panel-section grid direction-grid" aria-label="Choose next track section">
      <button id="addStraight" class="icon-button selected" aria-label="Straight" title="Straight">↑</button>
      <button id="addLeft" class="icon-button" aria-label="Left" title="Left">←</button>
      <button id="addRight" class="icon-button" aria-label="Right" title="Right">→</button>
      <button id="addUp" class="icon-button" aria-label="Up" title="Up">↗</button>
      <button id="addDown" class="icon-button" aria-label="Down" title="Down">↘</button>
      <button id="addLoopLeft" class="icon-button" aria-label="Left loop" title="Left loop">↺</button>
      <button id="addLoopRight" class="icon-button" aria-label="Right loop" title="Right loop">↻</button>
      <button id="addCorkscrewLeft" class="icon-button" aria-label="Left corkscrew" title="Left corkscrew">⟲</button>
      <button id="addCorkscrewRight" class="icon-button" aria-label="Right corkscrew" title="Right corkscrew">⟳</button>
      <button id="placeSection" class="good wide small-text-button">Place</button>
      <button id="snapStart" class="secondary wide small-text-button">Snap loop</button>
    </div>

    <div class="panel-section">
      <label>Speed <span class="value" id="speedValue">12</span>
        <input id="speedSlider" type="range" min="4" max="28" step="1" value="12" />
      </label>
      <div class="grid action-grid">
        <button id="testCoaster" class="good icon-button" aria-label="Start test" title="Start test">▶</button>
        <button id="viewMode" class="secondary small-text-button" aria-label="Toggle view" title="Toggle first/third person view">3rd</button>
        <button id="undo" class="secondary icon-button" aria-label="Undo" title="Undo">↶</button>
        <button id="clear" class="warning small-text-button">Clear</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="rollercoaster.js"></script>
</body>
</html>
